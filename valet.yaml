name: vanta-checks
display_name: Vanta Checks
description: >-
  Every day, posts the day's policy-relevant Vanta events to Slack with evidence links attached — failing tests, evidence due, access changes — so your compliance lead can answer auditors live.
category: compliance

story:
  hero: "Compliance events in Slack — with the evidence link attached."
  subheadline: >-
    Every day, the day's policy-relevant Vanta events land in Slack with evidence links attached — your compliance lead can answer auditors live.
  steps:
    - role: trigger
      title: "Every morning."
      body: >-
        The heartbeat fires once a day and picks up every Vanta event from the past 24 hours.
    - role: action
      title: "Vanta Checks pulls the artifacts."
      body: >-
        Reads the day's findings, controls, and access records from Vanta and gathers the evidence links your auditor will ask for.
      catalog: slack
    - role: outcome
      title: "A daily review pass in Slack."
      body: >-
        One event, one card, one link. Your compliance lead reviews the day's events together and answers auditors live, in-thread.
      catalog: slack

channels:
  - catalog: slack
    description: >-
      The agent gets its own Slack bot. Invite it to your compliance
      or audit channel and it posts per-event cards there. @mention
      it for ad-hoc questions like "what evidence is due this week?"
    ui:
      headline: "Give Vanta Checks a Slack bot."
      blurb: >-
        The agent posts compliance cards to every channel you invite
        it to. Invite it to one focused audit channel, or several —
        whatever matches your team.
      done_note: "Bot ready — invite it to a channel"

  - type: heartbeat
    every: 24h
    description: "Polls Vanta once a day for failing tests, evidence due soon, and access changes."
